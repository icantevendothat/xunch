<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XUNCH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video autoplay muted loop id="background-video">
    <source src="media/xunchbg.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="content">
    <img src="media/xunch.png" alt="Xunch Logo" class="logo">
    <h1>SAM WILBERT</h1>
    <div class="tv-container">
      <img src="media/tv.png" alt="TV" class="tv">
      <video autoplay muted loop id="tv-video">
        <source src="media/8mm2.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <footer class="footer hidden">
    <img src="media/xunch.png" alt="Xunch Footer Logo" class="footer-logo">
    <div class="menu-container">
      <img src="media/menu.png" alt="Menu Footer Icon" id="menu">
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
